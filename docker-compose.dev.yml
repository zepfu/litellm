services:
  litellm-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: litellm-dev
    ports:
      - "4001:4001"
    volumes:
      # Mount source for live code changes (key files only)
      - ./litellm/integrations/aawm_agent_identity.py:/app/litellm/integrations/aawm_agent_identity.py
      - ./litellm/integrations/aawm_payload_capture.py:/app/litellm/integrations/aawm_payload_capture.py
      - ./litellm-dev-config.yaml:/app/litellm-dev-config.yaml
      # Claude persisted-output files for local expansion
      - /home/zepfu/.claude/projects:/home/zepfu/.claude/projects:ro
      # Capture output — written to /tmp/captures inside container, visible on host
      - ./captures:/tmp/captures
    environment:
      # Langfuse — read from host env or set defaults
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LITELLM_LANGFUSE_TRACE_ENVIRONMENT=${LITELLM_LANGFUSE_TRACE_ENVIRONMENT:-dev}
      # AAWM dynamic injection database access
      - AAWM_DB_HOST=${LITELLM_AAWM_DB_HOST:-postgres18}
      - AAWM_DB_PORT=${LITELLM_AAWM_DB_PORT:-5432}
      - AAWM_DB_NAME=${LITELLM_AAWM_DB_NAME:-aawm_tristore}
      - AAWM_DB_USER=${LITELLM_AAWM_DB_USER:-aawm}
      - AAWM_DB_PASSWORD=${LITELLM_AAWM_DB_PASSWORD:-aawm_dev}
      - AAWM_DB_PWD=${LITELLM_AAWM_DB_PWD:-}
      - AAWM_DB_SSLMODE=${LITELLM_AAWM_DB_SSLMODE:-disable}
      - AAWM_DB_SSL=${LITELLM_AAWM_DB_SSL:-}
      - AAWM_DB_URL=${LITELLM_AAWM_DB_URL:-}
      - AAWM_DATABASE_URL=${LITELLM_AAWM_DATABASE_URL:-postgresql://aawm:aawm_dev@postgres18:5432/aawm_tristore}
      - AAWM_POSTGRES_SERVER=${LITELLM_AAWM_POSTGRES_SERVER:-}
      - AAWM_POSTGRES_PORT=${LITELLM_AAWM_POSTGRES_PORT:-}
      - AAWM_POSTGRES_DATABASE=${LITELLM_AAWM_POSTGRES_DATABASE:-}
      - AAWM_POSTGRES_USER=${LITELLM_AAWM_POSTGRES_USER:-}
      - AAWM_POSTGRES_PASSWORD=${LITELLM_AAWM_POSTGRES_PASSWORD:-}
      - AAWM_POSTGRES_PWD=${LITELLM_AAWM_POSTGRES_PWD:-}
      - AAWM_POSTGRES_SSLMODE=${LITELLM_AAWM_POSTGRES_SSLMODE:-}
      - AAWM_POSTGRES_SSL=${LITELLM_AAWM_POSTGRES_SSL:-}
      - AAWM_POSTGRES_URL=${LITELLM_AAWM_POSTGRES_URL:-}
      # No server-side ANTHROPIC_API_KEY — client provides via x-api-key header
      # Enable payload capture to ./captures/
      - AAWM_CAPTURE=1
      - LITELLM_EXPAND_CLAUDE_PERSISTED_OUTPUT=${LITELLM_EXPAND_CLAUDE_PERSISTED_OUTPUT:-1}
      - LITELLM_CLAUDE_PERSISTED_OUTPUT_ROOT=${LITELLM_CLAUDE_PERSISTED_OUTPUT_ROOT:-/home/zepfu/.claude/projects}
    networks:
      - default
      - aawm_default

networks:
  aawm_default:
    external: true

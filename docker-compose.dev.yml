services:
  litellm-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: litellm-dev
    restart: always
    command: ["litellm", "--config", "/app/litellm-dev-config.yaml", "--port", "4001"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      # Mount source for live code changes (key files only)
      - ./litellm/integrations/aawm_agent_identity.py:/app/litellm/integrations/aawm_agent_identity.py
      - ./litellm/integrations/aawm_session_history/record.py:/app/litellm/integrations/aawm_session_history/record.py
      - ./litellm/integrations/aawm_agent_quality_rules.py:/app/litellm/integrations/aawm_agent_quality_rules.py
      - ./litellm/integrations/aawm_agent_quality_rules.json:/app/litellm/integrations/aawm_agent_quality_rules.json
      - ./litellm/integrations/aawm_payload_capture.py:/app/litellm/integrations/aawm_payload_capture.py
      - ./litellm/integrations/aawm_passthrough_shape_capture.py:/app/litellm/integrations/aawm_passthrough_shape_capture.py
      - ./litellm/integrations/langfuse/langfuse.py:/app/litellm/integrations/langfuse/langfuse.py
      - ./litellm/integrations/langfuse/langfuse_handler.py:/app/litellm/integrations/langfuse/langfuse_handler.py
      - ./litellm/integrations/langfuse/langfuse_prompt_management.py:/app/litellm/integrations/langfuse/langfuse_prompt_management.py
      - ./litellm/__init__.py:/app/litellm/__init__.py
      - ./litellm/_lazy_imports_registry.py:/app/litellm/_lazy_imports_registry.py
      - ./litellm/constants.py:/app/litellm/constants.py
      - ./litellm/main.py:/app/litellm/main.py
      - ./litellm/utils.py:/app/litellm/utils.py
      - ./litellm/litellm_core_utils/get_model_cost_map.py:/app/litellm/litellm_core_utils/get_model_cost_map.py
      - ./litellm/litellm_core_utils/prompt_templates/factory.py:/app/litellm/litellm_core_utils/prompt_templates/factory.py
      - ./model_prices_and_context_window.json:/app/litellm/bundled_model_prices_and_context_window_fallback.json
      - ./litellm/types/llms/anthropic.py:/app/litellm/types/llms/anthropic.py
      - ./litellm/types/llms/anthropic_messages/anthropic_response.py:/app/litellm/types/llms/anthropic_messages/anthropic_response.py
      - ./litellm/types/llms/openai.py:/app/litellm/types/llms/openai.py
      - ./litellm/types/llms/vertex_ai.py:/app/litellm/types/llms/vertex_ai.py
      - ./litellm/types/utils.py:/app/litellm/types/utils.py
      - ./litellm/llms/custom_httpx/aiohttp_transport.py:/app/litellm/llms/custom_httpx/aiohttp_transport.py
      # Keep the complete Kimi provider package coherent with the bind-mounted
      # proxy handlers during development.
      - ./litellm/llms/kimi_code:/app/litellm/llms/kimi_code:ro
      # Keep the complete Alibaba Token Plan provider package coherent with the
      # bind-mounted provider registration and proxy handlers.
      - ./litellm/llms/alibaba_token_plan:/app/litellm/llms/alibaba_token_plan:ro
      - ./litellm/llms/vertex_ai/gemini/vertex_and_google_ai_studio_gemini.py:/app/litellm/llms/vertex_ai/gemini/vertex_and_google_ai_studio_gemini.py
      - ./litellm/llms/base_llm/rerank/transformation.py:/app/litellm/llms/base_llm/rerank/transformation.py
      - ./litellm/llms/hosted_vllm/embedding/transformation.py:/app/litellm/llms/hosted_vllm/embedding/transformation.py
      - ./litellm/llms/huggingface/rerank/transformation.py:/app/litellm/llms/huggingface/rerank/transformation.py
      - ./litellm/llms/nvidia_nim/embed.py:/app/litellm/llms/nvidia_nim/embed.py
      - ./litellm/llms/nvidia_nim/rerank/transformation.py:/app/litellm/llms/nvidia_nim/rerank/transformation.py
      - ./litellm/llms/openrouter/embedding/transformation.py:/app/litellm/llms/openrouter/embedding/transformation.py
      - ./litellm/llms/openrouter/rerank/transformation.py:/app/litellm/llms/openrouter/rerank/transformation.py
      - ./litellm/llms/anthropic/experimental_pass_through/responses_adapters/streaming_iterator.py:/app/litellm/llms/anthropic/experimental_pass_through/responses_adapters/streaming_iterator.py
      - ./litellm/llms/anthropic/experimental_pass_through/responses_adapters/transformation.py:/app/litellm/llms/anthropic/experimental_pass_through/responses_adapters/transformation.py
      - ./litellm/llms/anthropic/experimental_pass_through/adapters/handler.py:/app/litellm/llms/anthropic/experimental_pass_through/adapters/handler.py
      - ./litellm/llms/anthropic/experimental_pass_through/adapters/observability.py:/app/litellm/llms/anthropic/experimental_pass_through/adapters/observability.py
      - ./litellm/llms/anthropic/experimental_pass_through/adapters/transformation.py:/app/litellm/llms/anthropic/experimental_pass_through/adapters/transformation.py
      - ./litellm/llms/anthropic/experimental_pass_through/adapters/streaming_iterator.py:/app/litellm/llms/anthropic/experimental_pass_through/adapters/streaming_iterator.py
      - ./litellm/_logging.py:/app/litellm/_logging.py
      - ./litellm/litellm_core_utils/health_check_helpers.py:/app/litellm/litellm_core_utils/health_check_helpers.py
      - ./litellm/passthrough/utils.py:/app/litellm/passthrough/utils.py
      - ./litellm/rerank_api/main.py:/app/litellm/rerank_api/main.py
      - ./litellm/proxy/aawm_route_logging.py:/app/litellm/proxy/aawm_route_logging.py
      - ./litellm/proxy/aawm_alias_routing_redis.py:/app/litellm/proxy/aawm_alias_routing_redis.py
      - ./litellm/proxy/aawm_runtime_error_logging.py:/app/litellm/proxy/aawm_runtime_error_logging.py
      - ./litellm/proxy/common_request_processing.py:/app/litellm/proxy/common_request_processing.py
      - ./litellm/proxy/health_endpoints/_health_endpoints.py:/app/litellm/proxy/health_endpoints/_health_endpoints.py
      - ./litellm/proxy/proxy_server.py:/app/litellm/proxy/proxy_server.py
      - ./litellm/proxy/guardrails/guardrail_hooks/presidio.py:/app/litellm/proxy/guardrails/guardrail_hooks/presidio.py
      - ./litellm/proxy/pass_through_endpoints/pass_through_endpoints.py:/app/litellm/proxy/pass_through_endpoints/pass_through_endpoints.py
      - ./litellm/proxy/pass_through_endpoints/streaming_handler.py:/app/litellm/proxy/pass_through_endpoints/streaming_handler.py
      - ./litellm/proxy/pass_through_endpoints/success_handler.py:/app/litellm/proxy/pass_through_endpoints/success_handler.py
      - ./litellm/proxy/pass_through_endpoints/google_code_assist_quota.py:/app/litellm/proxy/pass_through_endpoints/google_code_assist_quota.py
      - ./litellm/proxy/pass_through_endpoints/kimi_gateway.py:/app/litellm/proxy/pass_through_endpoints/kimi_gateway.py:ro
      - ./litellm/proxy/pass_through_endpoints/llm_provider_handlers/base_passthrough_logging_handler.py:/app/litellm/proxy/pass_through_endpoints/llm_provider_handlers/base_passthrough_logging_handler.py
      - ./litellm/proxy/pass_through_endpoints/llm_provider_handlers/anthropic_passthrough_logging_handler.py:/app/litellm/proxy/pass_through_endpoints/llm_provider_handlers/anthropic_passthrough_logging_handler.py
      - ./litellm/proxy/pass_through_endpoints/llm_provider_handlers/gemini_passthrough_logging_handler.py:/app/litellm/proxy/pass_through_endpoints/llm_provider_handlers/gemini_passthrough_logging_handler.py
      - ./litellm/proxy/pass_through_endpoints/aawm_claude_control_plane.py:/app/litellm/proxy/pass_through_endpoints/aawm_claude_control_plane.py
      - ./litellm/proxy/pass_through_endpoints/llm_passthrough_endpoints.py:/app/litellm/proxy/pass_through_endpoints/llm_passthrough_endpoints.py
      - ./litellm/proxy/pass_through_endpoints/aawm_alias_routing:/app/litellm/proxy/pass_through_endpoints/aawm_alias_routing:ro
      - ./litellm/proxy/pass_through_endpoints/llm_provider_handlers/openai_passthrough_logging_handler.py:/app/litellm/proxy/pass_through_endpoints/llm_provider_handlers/openai_passthrough_logging_handler.py
      - ./litellm/proxy/response_api_endpoints/endpoints.py:/app/litellm/proxy/response_api_endpoints/endpoints.py
      - ./litellm/proxy/route_llm_request.py:/app/litellm/proxy/route_llm_request.py
      - ./litellm/litellm_core_utils/get_llm_provider_logic.py:/app/litellm/litellm_core_utils/get_llm_provider_logic.py
      - ./litellm/llms/xai/oauth.py:/app/litellm/llms/xai/oauth.py
      - ./litellm/responses/litellm_completion_transformation/streaming_iterator.py:/app/litellm/responses/litellm_completion_transformation/streaming_iterator.py
      - ./model_prices_and_context_window.json:/app/model_prices_and_context_window.json
      - ./context-replacement:/app/context-replacement
      - ./litellm-dev-config.yaml:/app/litellm-dev-config.yaml
      # Repo-local error intake for managed LiteLLM runtime errors.
      - ./.analysis:/app/.analysis
      # Claude persisted-output files for local expansion
      - /home/zepfu/.claude/projects:/home/zepfu/.claude/projects:ro
      # Claude agent specs for subagent model resolution
      - /home/zepfu/projects/aawm/agents:/home/zepfu/.claude/agents:ro
      # Codex OAuth tokens for Anthropic->Codex adapter testing
      - /home/zepfu/.codex:/home/zepfu/.codex:ro
      # OpenCode Zen auth for native OpenCode and Codex/Claude adapter testing
      - /home/zepfu/.local/share/opencode:/home/zepfu/.local/share/opencode:ro
      # Gemini and Antigravity OAuth tokens for adapter testing. LiteLLM reads
      # only; provider-status-observations does not monitor or refresh them.
      - /home/zepfu/.gemini:/home/zepfu/.gemini:ro
      # Grok CLI OAuth tokens for native Grok OIDC passthrough. LiteLLM reads only;
      # provider-status-observations owns scheduled refresh writes.
      - /home/zepfu/.grok:/home/zepfu/.grok:ro
      # Managed xAI OAuth credentials for oa_xai/* routes. LiteLLM reads only;
      # provider-status-observations owns scheduled refresh writes.
      - /home/zepfu/.litellm/xai:/home/zepfu/.litellm/xai:ro
      # Kimi Code CLI credential directory. LiteLLM only reads the host CLI's
      # existing grant; the directory mount preserves atomic credential replacement.
      - /home/zepfu/.kimi-code/credentials:/home/zepfu/.kimi-code/credentials:ro
      # Qwen CLI settings are the canonical Token Plan credential owner.
      # LiteLLM reads the existing file in place and never copies the key.
      - /home/zepfu/.qwen/settings.json:/home/zepfu/.qwen/settings.json:ro
      # Home-level local-only analysis artifacts; raw full-payload captures may include credentials.
      - /home/zepfu/.analysis:/home/zepfu/.analysis
      # Gemini CLI install for OAuth client fallback during local adapter testing
      - /home/zepfu/.nvm/versions/node:/home/zepfu/.nvm/versions/node:ro
      # Antigravity CLI binary for OAuth client fallback during local adapter testing
      - /home/zepfu/.local/bin/agy:/home/zepfu/.local/bin/agy:ro
      # Capture output — written to /tmp/captures inside container, visible on host
      - ./captures:/tmp/captures
      # Durable session_history outage spool for replay after DB outages.
      - /mnt/e/litellm/session_history:/mnt/e/litellm/session_history
      # Read-only host identity lookup surface for local Tailscale MagicDNS attribution.
      - /etc/hostname:/host/etc/hostname:ro
      # Sanitized Tailscale self identity for local host attribution (host-maintained).
      - ${AAWM_ROUTE_HOST_TAILSCALE_SELF_SNAPSHOT_HOST_DIR:-/home/zepfu/.analysis/aawm-host-identity}:/host/aawm:ro
    environment:
      # Langfuse — read from host env or set defaults
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LITELLM_LANGFUSE_TRACE_ENVIRONMENT=${LITELLM_LANGFUSE_TRACE_ENVIRONMENT:-dev}
      - LITELLM_AAWM_ERROR_LOG_ENABLED=${LITELLM_AAWM_ERROR_LOG_ENABLED:-1}
      - LITELLM_AAWM_ERROR_LOG_ENV=${LITELLM_AAWM_ERROR_LOG_ENV:-dev}
      - LITELLM_AAWM_ERROR_LOG_DIR=${LITELLM_AAWM_ERROR_LOG_DIR:-/app/.analysis}
      - AAWM_ROUTE_HOST_TAILSCALE_SELF_SNAPSHOT_PATH=${AAWM_ROUTE_HOST_TAILSCALE_SELF_SNAPSHOT_PATH:-/host/aawm/tailscale-self.json}
      - LITELLM_LOCAL_MODEL_COST_MAP=${LITELLM_LOCAL_MODEL_COST_MAP:-True}
      - AAWM_CAPTURE_PASSTHROUGH_FULL_PAYLOADS_DIR=${AAWM_CAPTURE_PASSTHROUGH_FULL_PAYLOADS_DIR:-/home/zepfu/.analysis/full-payload-captures/runtime}
      # AAWM runtime database access goes through shared PgBouncer. Keep
      # AAWM_DIRECT_DATABASE_URL on direct Postgres for admin/backfill paths.
      - AAWM_DB_HOST=${LITELLM_AAWM_DB_HOST:-pgbouncer}
      - AAWM_DB_PORT=${LITELLM_AAWM_DB_PORT:-6432}
      - AAWM_DB_NAME=${LITELLM_AAWM_DB_NAME:-aawm_tristore}
      - AAWM_DB_USER=${LITELLM_AAWM_DB_USER:-aawm}
      - AAWM_DB_PASSWORD=${LITELLM_AAWM_DB_PASSWORD:-aawm_dev}
      - AAWM_DB_PWD=${LITELLM_AAWM_DB_PWD:-}
      - AAWM_DB_SSLMODE=${LITELLM_AAWM_DB_SSLMODE:-disable}
      - AAWM_DB_SSL=${LITELLM_AAWM_DB_SSL:-}
      - AAWM_DB_URL=${LITELLM_AAWM_DB_URL:-}
      - AAWM_DATABASE_URL=${LITELLM_AAWM_DATABASE_URL:-postgresql://aawm:aawm_dev@pgbouncer:6432/aawm_tristore?application_name=aawm-litellm-session-history}
      - AAWM_DIRECT_DATABASE_URL=${LITELLM_AAWM_DIRECT_DATABASE_URL:-postgresql://aawm:aawm_dev@postgres18:5432/aawm_tristore}
      - AAWM_SESSION_HISTORY_DB_APPLICATION_NAME=${LITELLM_AAWM_SESSION_HISTORY_DB_APPLICATION_NAME:-aawm-litellm-session-history}
      - AAWM_SESSION_HISTORY_SPOOL_DIR=${AAWM_SESSION_HISTORY_SPOOL_DIR:-/mnt/e/litellm/session_history}
      - AAWM_SESSION_HISTORY_STATEMENT_CACHE_SIZE=${LITELLM_AAWM_SESSION_HISTORY_STATEMENT_CACHE_SIZE:-0}
      - AAWM_DYNAMIC_INJECTION_DB_APPLICATION_NAME=${LITELLM_AAWM_DYNAMIC_INJECTION_DB_APPLICATION_NAME:-aawm-litellm-dynamic-injection}
      - PGAPPNAME=${LITELLM_AAWM_DB_APPLICATION_NAME:-aawm-litellm-runtime}
      - AAWM_POSTGRES_SERVER=${LITELLM_AAWM_POSTGRES_SERVER:-}
      - AAWM_POSTGRES_PORT=${LITELLM_AAWM_POSTGRES_PORT:-}
      - AAWM_POSTGRES_DATABASE=${LITELLM_AAWM_POSTGRES_DATABASE:-}
      - AAWM_POSTGRES_USER=${LITELLM_AAWM_POSTGRES_USER:-}
      - AAWM_POSTGRES_PASSWORD=${LITELLM_AAWM_POSTGRES_PASSWORD:-}
      - AAWM_POSTGRES_PWD=${LITELLM_AAWM_POSTGRES_PWD:-}
      - AAWM_POSTGRES_SSLMODE=${LITELLM_AAWM_POSTGRES_SSLMODE:-}
      - AAWM_POSTGRES_SSL=${LITELLM_AAWM_POSTGRES_SSL:-}
      - AAWM_POSTGRES_URL=${LITELLM_AAWM_POSTGRES_URL:-}
      # No server-side ANTHROPIC_API_KEY — client provides via x-api-key header
      # Payload capture stays off by default; enable explicitly for debug sessions
      - AAWM_CAPTURE=${AAWM_CAPTURE:-0}
      - AAWM_CAPTURE_PASSTHROUGH_SHAPES=${AAWM_CAPTURE_PASSTHROUGH_SHAPES:-0}
      - LITELLM_LOG=${LITELLM_LOG:-INFO}
      - AAWM_GEMINI_ROUTE_DEBUG=${AAWM_GEMINI_ROUTE_DEBUG:-0}
      - AAWM_GOOGLE_CODE_ASSIST_PRIME_TTL_SECONDS=${AAWM_GOOGLE_CODE_ASSIST_PRIME_TTL_SECONDS:-30}
      - AAWM_GOOGLE_ADAPTER_HIDDEN_RETRY_BUDGET_SECONDS=${AAWM_GOOGLE_ADAPTER_HIDDEN_RETRY_BUDGET_SECONDS:-180}
      - AAWM_GOOGLE_ADAPTER_MODEL_CAPACITY_MAX_RETRIES=${AAWM_GOOGLE_ADAPTER_MODEL_CAPACITY_MAX_RETRIES:-8}
      - AAWM_GOOGLE_ADAPTER_MODEL_CAPACITY_BACKOFF_SECONDS=${AAWM_GOOGLE_ADAPTER_MODEL_CAPACITY_BACKOFF_SECONDS:-2,4,8,12,20,30,45,60}
      - LITELLM_EXPAND_CLAUDE_PERSISTED_OUTPUT=${LITELLM_EXPAND_CLAUDE_PERSISTED_OUTPUT:-1}
      - LITELLM_CLAUDE_PERSISTED_OUTPUT_ROOT=${LITELLM_CLAUDE_PERSISTED_OUTPUT_ROOT:-/home/zepfu/.claude/projects}
      - LITELLM_CODEX_AUTH_FILE=${LITELLM_CODEX_AUTH_FILE:-/home/zepfu/.codex/auth.json}
      - LITELLM_OPENCODE_AUTH_FILE=${LITELLM_OPENCODE_AUTH_FILE:-/home/zepfu/.local/share/opencode/auth.json}
      - LITELLM_GEMINI_AUTH_FILE=${LITELLM_GEMINI_AUTH_FILE:-/home/zepfu/.gemini/oauth_creds.json}
      - LITELLM_ANTIGRAVITY_AUTH_FILE=${LITELLM_ANTIGRAVITY_AUTH_FILE:-/home/zepfu/.gemini/antigravity-cli/antigravity-oauth-token}
      - LITELLM_GEMINI_OAUTH_CLIENT_ID=${LITELLM_GEMINI_OAUTH_CLIENT_ID:-}
      - LITELLM_GEMINI_OAUTH_CLIENT_SECRET=${LITELLM_GEMINI_OAUTH_CLIENT_SECRET:-}
      - LITELLM_GEMINI_CLI_BUNDLE_PATH=${LITELLM_GEMINI_CLI_BUNDLE_PATH:-}
      - AAWM_NVIDIA_API_KEY=${AAWM_NVIDIA_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-${AAWM_NVIDIA_API_KEY:-}}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-${AAWM_NVIDIA_API_KEY:-}}
      - NVIDIA_NIM_API_BASE=${NVIDIA_NIM_API_BASE:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_RERANK_API_BASE=${NVIDIA_NIM_RERANK_API_BASE:-https://ai.api.nvidia.com}
      - AAWM_OPENROUTER_API_KEY=${AAWM_OPENROUTER_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_API_BASE=${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}
      - LITELLM_XAI_OAUTH_AUTH_FILE=${LITELLM_XAI_OAUTH_AUTH_FILE:-/home/zepfu/.litellm/xai/oauth-auth.json}
      - LITELLM_XAI_GROK_AUTH_FILE=${LITELLM_XAI_GROK_AUTH_FILE:-/home/zepfu/.grok/auth.json}
      - LITELLM_KIMI_OAUTH_AUTH_FILE=${LITELLM_KIMI_OAUTH_AUTH_FILE:-/home/zepfu/.kimi-code/credentials/kimi-code.json}
      - LITELLM_ALIBABA_TOKEN_PLAN_SETTINGS_FILE=${LITELLM_ALIBABA_TOKEN_PLAN_SETTINGS_FILE:-/home/zepfu/.qwen/settings.json}
      - OPENAI_API_KEY=${AAWM_OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OR_SITE_URL=${OR_SITE_URL:-https://litellm.ai}
      - OR_APP_NAME=${OR_APP_NAME:-liteLLM}
      - AAWM_OPENROUTER_ADAPTER_BACKOFF_SECONDS=${AAWM_OPENROUTER_ADAPTER_BACKOFF_SECONDS:-2,4,8,12}
      - AAWM_OPENROUTER_ADAPTER_HIDDEN_RETRY_BUDGET_SECONDS=${AAWM_OPENROUTER_ADAPTER_HIDDEN_RETRY_BUDGET_SECONDS:-12}
      - AAWM_OPENROUTER_ADAPTER_POST_FAILURE_COOLDOWN_SECONDS=${AAWM_OPENROUTER_ADAPTER_POST_FAILURE_COOLDOWN_SECONDS:-300}
      # Dedicated alias-routing Redis state (dev)
      - AAWM_ALIAS_ROUTING_REDIS_HOST=${AAWM_ALIAS_ROUTING_REDIS_HOST:-aawm-alias-routing-redis}
      - AAWM_ALIAS_ROUTING_REDIS_PORT=${AAWM_ALIAS_ROUTING_REDIS_PORT:-6379}
      - AAWM_ALIAS_ROUTING_REDIS_DB=${AAWM_ALIAS_ROUTING_REDIS_DB:-0}
      - AAWM_ALIAS_ROUTING_REDIS_PASSWORD=${AAWM_ALIAS_ROUTING_REDIS_PASSWORD:-}
      - AAWM_ALIAS_ROUTING_REDIS_SSL=${AAWM_ALIAS_ROUTING_REDIS_SSL:-0}
      - AAWM_ALIAS_ROUTING_REDIS_URL=${AAWM_ALIAS_ROUTING_REDIS_URL:-}
      - AAWM_ALIAS_ROUTING_REDIS_USERNAME=${AAWM_ALIAS_ROUTING_REDIS_USERNAME:-}
      - AAWM_ALIAS_ROUTING_STATE_NAMESPACE=${AAWM_ALIAS_ROUTING_STATE_NAMESPACE:-aawm-routing-dev-v1}
      - AAWM_ALIAS_ROUTE_LOG_HEALTHY=${AAWM_ALIAS_ROUTE_LOG_HEALTHY:-0}
    networks:
      - default
      - aawm_default
    depends_on:
      aawm-alias-routing-redis:
        condition: service_healthy

  aawm-alias-routing-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - aawm_alias_routing_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - default

  provider-status-observations:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider_status_observations
    image: aawm-provider-status-observations:dev
    container_name: aawm-provider-status-observations
    restart: unless-stopped
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    volumes:
      # Repo-local error intake for managed sidecar anomaly/runtime errors.
      - ./.analysis:/app/.analysis
      # The provider-status sidecar is the scheduled writer for Grok OIDC.
      - /home/zepfu/.grok:/home/zepfu/.grok
      # The provider-status sidecar is the scheduled writer for Codex OAuth.
      - /home/zepfu/.codex:/home/zepfu/.codex
      # The provider-status sidecar is the scheduled writer for managed xAI OAuth.
      - /home/zepfu/.litellm/xai:/home/zepfu/.litellm/xai
      # Kimi Code refresh needs only the shared credential directory and the
      # native proper-lockfile parent for the oauth/kimi-code sentinel.
      - /home/zepfu/.kimi-code/credentials:/home/zepfu/.kimi-code/credentials
      - /home/zepfu/.kimi-code/oauth:/home/zepfu/.kimi-code/oauth
    environment:

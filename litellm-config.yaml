model_list:
  # Claude models via native anthropic/ provider.
  # Auth: forward_client_headers_to_llm_api (general_settings) passes the client's
  # Authorization: Bearer sk-ant-oat01-... header directly to Anthropic.
  # No ANTHROPIC_API_KEY needed on the server — the Claude Pro/Max OAuth token
  # is supplied by the client (Claude Code) on every request.
  - model_name: "openai/claude-sonnet-4-20250514"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"

  - model_name: "openai/claude-opus-4-6"
    litellm_params:
      model: "anthropic/claude-opus-4-6"

  # Short aliases for Claude models
  - model_name: "sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"

  - model_name: "opus"
    litellm_params:
      model: "anthropic/claude-opus-4-6"

  - model_name: "haiku"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"

  # Claude Code sends these exact model IDs via the Anthropic messages API.
  # These aliases map them to the anthropic/ provider with header forwarding.
  - model_name: "claude-opus-4-6"
    litellm_params:
      model: "anthropic/claude-opus-4-6"

  - model_name: "claude-sonnet-4-6"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"

  - model_name: "claude-sonnet-4-20250514"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"

  - model_name: "claude-haiku-4-5-20251001"
    litellm_params:
      model: "anthropic/claude-haiku-4-5-20251001"

  - model_name: "claude-haiku-4-5"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"

  # Gemini models via CLIProxyAPI (Docker Compose service name for inter-container routing)
  # NOTE: Gemini kept on CLIProxyAPI — no native LiteLLM OAuth support yet (GitHub #18606).
  - model_name: "openai/gemini-2.5-pro"
    litellm_params:
      model: "openai/gemini-2.5-pro"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "openai/gemini-2.5-flash"
    litellm_params:
      model: "openai/gemini-2.5-flash"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "openai/gemini-3-pro-preview"
    litellm_params:
      model: "openai/gemini-3-pro-preview"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "openai/gemini-3-flash-preview"
    litellm_params:
      model: "openai/gemini-3-flash-preview"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "openai/gemini-2.5-flash-lite"
    litellm_params:
      model: "openai/gemini-2.5-flash-lite"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  # Short aliases for Gemini models
  - model_name: "gemini-pro"
    litellm_params:
      model: "openai/gemini-2.5-pro"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "gemini-flash"
    litellm_params:
      model: "openai/gemini-2.5-flash"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "gemini-pro-preview"
    litellm_params:
      model: "openai/gemini-3-pro-preview"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "gemini-flash-preview"
    litellm_params:
      model: "openai/gemini-3-flash-preview"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  - model_name: "flash-lite"
    litellm_params:
      model: "openai/gemini-2.5-flash-lite"
      api_base: "http://cliproxyapi:8317/v1"
      api_key: "aawm-local-only"

  # ChatGPT/Codex models via native chatgpt/ provider.
  # Auth: device-code OAuth flow. First request triggers an interactive browser-based
  # device-code login (one-time). Token stored at ~/.config/litellm/chatgpt/auth.json,
  # mounted as a named volume (chatgpt_auth) so it persists across container restarts.
  # Subsequent requests are fully headless — no interaction required.
  # model_info.mode: responses — required for ChatGPT Responses API compatibility.
  - model_name: "openai/gpt-5"
    model_info:
      mode: responses
    litellm_params:
      model: "chatgpt/gpt-5"

  - model_name: "openai/gpt-5.1"
    model_info:
      mode: responses
    litellm_params:
      model: "chatgpt/gpt-5.1"

  - model_name: "openai/gpt-5.2"
    model_info:
      mode: responses
    litellm_params:
      model: "chatgpt/gpt-5.2"

  # Codex models via native chatgpt/ provider

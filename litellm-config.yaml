litellm_settings:
  drop_params: true
  # Langfuse observability — log all successful LLM calls as traces.
  # Requires LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST env vars
  # (injected via docker-compose environment block on the litellm service).
  success_callback: ["langfuse"]
  # Request timeout note: LiteLLM proxy default is 6000s (from constants.py env var
  # REQUEST_TIMEOUT). CLIProxyAPI logs show Claude API can take 5-10s under load.
  # Setting request_timeout here does NOT reliably override the default due to
  # LiteLLM proxy startup order (use REQUEST_TIMEOUT env var to override instead).
  # The 6000s default is deliberately permissive — do not lower below 30s.

general_settings:
  # Forward client Authorization header to Anthropic untouched.
  # This is what allows Claude Pro/Max OAuth tokens (sk-ant-oat01-...) to work
  # without a server-side ANTHROPIC_API_KEY. The client (Claude Code) supplies
  # the bearer token directly to LiteLLM, which passes it through to the upstream
  # Anthropic API. Proxy auth is disabled for local dev — localhost-only binding
  # provides sufficient security.
  forward_client_headers_to_llm_api: true

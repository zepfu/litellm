name: Build and publish AAWM fork image
on:
  push:
    tags:
      - 'v*-aawm.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zepfu/litellm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke test — verify runtime imports
        run: |
          docker build -t litellm-runtime-test .
          docker run --rm --entrypoint python3 litellm-runtime-test -c "
          from importlib.metadata import version
          print('litellm', version('litellm'))
          import litellm
          from litellm.proxy.proxy_server import app
          print('proxy server module loaded')
          print('smoke test passed')
          "

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ format('{0}/{1}:{2},{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME, steps.version.outputs.version) }}
          platforms: linux/amd64

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "AAWM LiteLLM fork ${{ steps.version.outputs.version }}" \
            --notes "$(cat <<'EOF'
          AAWM LiteLLM fork image release.

          **Container images:**
          - `ghcr.io/zepfu/litellm:${{ steps.version.outputs.version }}`
          - `ghcr.io/zepfu/litellm:latest`
          EOF
          )"

model_list:
  - model_name: "claude-sonnet-4-6"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
  - model_name: "openrouter/qwen/qwen3-embedding-8b"
    litellm_params:
      model: "openrouter/qwen/qwen3-embedding-8b"
    model_info:
      mode: embedding
  - model_name: "openrouter/cohere/rerank-4-pro"
    litellm_params:
      model: "openrouter/cohere/rerank-4-pro"
    model_info:
      mode: rerank

litellm_settings:
  drop_params: true
  success_callback: ["litellm.integrations.aawm_agent_identity.aawm_agent_identity_instance", "langfuse", "litellm.integrations.aawm_payload_capture.aawm_payload_capture_instance"]
  model_group_settings:
    forward_client_headers_to_llm_api:
      - "claude-sonnet-4-6"

# docker-compose.yml — LiteLLM AAWM fork, standalone deployment
#
# Runs LiteLLM (built from this fork) with all dependent services:
#   - CLIProxyAPI: routes Gemini model requests (referenced in litellm-config.yaml)
#   - Langfuse v3 observability stack: ClickHouse, Redis, MinIO, langfuse-web, langfuse-worker
#   - PostgreSQL 18: used by Langfuse for relational data
#
# Prerequisites:
#   1. Copy ../aawm/cliproxyapi-config.yaml to cliproxyapi-config.yaml (or create your own).
#      CLIProxyAPI config is not bundled here — it is AAWM-specific.
#      Example: cp ~/projects/aawm/cliproxyapi-config.yaml ./cliproxyapi-config.yaml
#   2. Create a .env file with secrets (see .env.example if present):
#        AAWM_XAI_API_KEY=<your-xai-key>       # optional — only needed for Grok models
#        AAWM_OPENAI_API_KEY=<your-openai-key>  # optional — only needed for embedding models
#        POSTGRES_PASSWORD=aawm_dev             # Langfuse DB password
#        AAWM_DB_PASSWORD=aawm_dev              # same value, used in DATABASE_URL
#
# Usage:
#   docker compose up                  # start all services
#   docker compose up litellm          # start only LiteLLM + deps
#   docker compose logs -f litellm     # tail LiteLLM logs
#
# Notes on litellm-config.yaml references:
#   - Gemini api_base uses Docker service name "cliproxyapi" — works inside this compose network.
#   - LANGFUSE_HOST is "http://langfuse-web:3000" — works inside this compose network.
#   - AAWM_XAI_API_KEY / AAWM_OPENAI_API_KEY are AAWM-prefixed env var names referenced
#     via os.environ/AAWM_XAI_API_KEY in the config. They must be set in .env or environment.

services:

  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    container_name: litellm-cliproxyapi
    restart: unless-stopped
    ports:
      # API endpoint — localhost only, never expose externally
      - "127.0.0.1:${AAWM_CLIPROXYAPI_PORT:-8317}:8317"
      # OAuth callback ports for provider auth flows (localhost only)
      - "127.0.0.1:1455:1455"
      - "127.0.0.1:8085:8085"
      - "127.0.0.1:54545:54545"
      - "127.0.0.1:51121:51121"
      - "127.0.0.1:11451:11451"
    volumes:
      # cliproxyapi-config.yaml must be present in this repo root.
      # Copy from AAWM repo: cp ~/projects/aawm/cliproxyapi-config.yaml ./cliproxyapi-config.yaml
      - ./cliproxyapi-config.yaml:/CLIProxyAPI/config.yaml:ro
      - cliproxyapi_data:/data/auths
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Authorization: Bearer aawm-local-only' http://localhost:8317/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  litellm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        target: runtime
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AAWM_LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
      # Persist ChatGPT device-code OAuth token across container restarts.
      # First request triggers a one-time interactive device-code login flow;
      # token is cached at /root/.config/litellm/chatgpt/auth.json.
      - chatgpt_auth:/root/.config/litellm/chatgpt
    environment:
      LITELLM_DROP_PARAMS: "true"
      # ANTHROPIC_API_KEY is intentionally absent: Claude auth uses
      # forward_client_headers_to_llm_api — the client's OAuth bearer token
      # (sk-ant-oat01-...) is passed through to Anthropic directly.
      AAWM_XAI_API_KEY: "${AAWM_XAI_API_KEY:-}"
      AAWM_OPENAI_API_KEY: "${AAWM_OPENAI_API_KEY:-}"
      # Langfuse callback integration — service name resolves within compose network
      LANGFUSE_HOST: "http://langfuse-web:3000"
      LANGFUSE_PUBLIC_KEY: "pk-lf-aawm-dev"
      LANGFUSE_SECRET_KEY: "sk-lf-aawm-dev"
      # CONFIG_FILE_PATH required for proxy_startup_event to load general_settings
      CONFIG_FILE_PATH: /app/config.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; r=urllib.request.Request('http://localhost:4000/health/liveliness'); urllib.request.urlopen(r)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      cliproxyapi:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Langfuse v3 — LLM Observability Stack
  # ---------------------------------------------------------------------------

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: litellm-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"  # HTTP API
      - "127.0.0.1:9000:9000"  # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-redis:
    image: redis:7-alpine
    container_name: litellm-langfuse-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - langfuse_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: litellm-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9010:9000"    # S3 API
      - "127.0.0.1:9011:9001"    # Web console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse-secret
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres18:
    image: postgres:16
    container_name: litellm-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: aawm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aawm_dev}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aawm -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: litellm-langfuse-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: "postgresql://aawm:${AAWM_DB_PASSWORD:-aawm_dev}@postgres18:5432/langfuse"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://clickhouse:9000"
      CLICKHOUSE_USER: "clickhouse"
      CLICKHOUSE_PASSWORD: "clickhouse"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_ENDPOINT: "http://minio:9000"
      LANGFUSE_S3_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_BUCKET_NAME: langfuse
      LANGFUSE_S3_REGION: us-east-1
      LANGFUSE_S3_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      NEXTAUTH_SECRET: aawm-langfuse-dev-secret
      SALT: aawm-langfuse-dev-salt
      NEXTAUTH_URL: "http://localhost:3000"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: aawm
      LANGFUSE_INIT_ORG_NAME: AAWM
      LANGFUSE_INIT_PROJECT_ID: aawm-dev
      LANGFUSE_INIT_PROJECT_NAME: AAWM Development
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-aawm-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-aawm-dev
      LANGFUSE_INIT_USER_EMAIL: admin@aawm.dev
      LANGFUSE_INIT_USER_PASSWORD: aawm-langfuse-admin
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres18:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: litellm-langfuse-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://aawm:${AAWM_DB_PASSWORD:-aawm_dev}@postgres18:5432/langfuse"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://clickhouse:9000"
      CLICKHOUSE_USER: "clickhouse"
      CLICKHOUSE_PASSWORD: "clickhouse"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_ENDPOINT: "http://minio:9000"
      LANGFUSE_S3_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_BUCKET_NAME: langfuse
      LANGFUSE_S3_REGION: us-east-1
      LANGFUSE_S3_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      NEXTAUTH_SECRET: aawm-langfuse-dev-secret
      SALT: aawm-langfuse-dev-salt
      NEXTAUTH_URL: "http://localhost:3000"
      TELEMETRY_ENABLED: "false"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):3030/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      postgres18:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy

volumes:
  postgres_data:
  cliproxyapi_data:
  clickhouse_data:
  langfuse_redis_data:
  minio_data:
  chatgpt_auth:
